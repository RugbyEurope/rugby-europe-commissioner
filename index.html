<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#003087">
<title>RE Match Commissioner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#003087;--navy2:#001a5e;--blue:#1a56c4;--gold:#F5C518;--green:#1DB86B;
  --gray:#8B96A5;--light:#F2F5F9;--white:#fff;--border:#DDE3EC;--green-bg:#EAF9F2;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--navy);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.spacer{height:var(--sat);background:linear-gradient(135deg,var(--navy2),var(--navy));flex-shrink:0;}

.hdr{background:linear-gradient(135deg,var(--navy2) 0%,var(--navy) 60%,var(--blue) 100%);padding:0 14px;height:64px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:2px solid var(--gold);}
.re-badge{width:46px;height:46px;background:linear-gradient(135deg,var(--gold),#e6b000);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--navy2);letter-spacing:1.5px;flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,0.3);}
.hdr-t{flex:1;min-width:0;}
.hdr-t h1{font-size:16px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.hdr-t p{font-size:9px;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px;font-weight:600;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px;}

.prog{padding:10px 16px 12px;background:linear-gradient(135deg,var(--navy2),var(--navy));flex-shrink:0;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.45);}
.prog-n{font-size:12px;font-weight:800;color:var(--gold);}
.prog-track{height:5px;background:rgba(255,255,255,0.12);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ffe066);border-radius:99px;width:0%;transition:width .4s;}

.tabs{background:linear-gradient(135deg,var(--navy2),var(--navy));display:flex;gap:6px;padding:0 12px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;height:34px;padding:0 13px;border-radius:17px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;border:none;white-space:nowrap;font-family:inherit;}
.tab.off{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);}
.tab.on{background:var(--gold);color:var(--navy2);}
.tbadge{min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.tab.off .tbadge{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);}
.tab.on .tbadge{background:var(--navy2);color:var(--gold);}
.tab.done .tbadge{background:var(--green);color:#fff;}

.scroll{flex:1;background:var(--light);border-radius:20px 20px 0 0;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(var(--nav-h) + var(--sab) + 24px);}

/* OVERVIEW */
.ov-total{margin:14px 12px 0;background:linear-gradient(135deg,var(--navy2),var(--navy));border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:16px;border:1px solid rgba(245,197,24,0.25);}
.ov-ring{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ov-inner{width:48px;height:48px;border-radius:50%;background:var(--navy2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold);}
.ov-txt h3{font-size:16px;font-weight:800;color:#fff;}
.ov-txt p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;}
.ov-grid{margin:10px 12px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,48,135,.12);cursor:pointer;border:1px solid var(--border);}
.pc-top{padding:14px 14px 10px;}
.pc-label{font-size:15px;font-weight:800;color:var(--navy);line-height:1.1;}
.pc-desc{font-size:10px;color:var(--gray);margin-top:3px;line-height:1.3;}
.pc-bar{height:5px;background:var(--border);}
.pc-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--blue));transition:width .4s;}
.pc.done .pc-fill{background:var(--green);}
.pc-bot{padding:8px 14px 12px;display:flex;justify-content:space-between;align-items:center;}
.pc-pct{font-size:13px;font-weight:700;color:var(--navy);}
.pc-done{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);padding:2px 8px;border-radius:8px;display:none;}
.pc.done .pc-done{display:block;}
.export-btn{margin:12px 12px 4px;width:calc(100% - 24px);height:50px;background:linear-gradient(135deg,var(--navy2),var(--blue));border:2px solid var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;font-size:14px;font-weight:700;color:var(--gold);cursor:pointer;}

/* CHECKLIST */
.sec-lbl{padding:18px 16px 8px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gray);text-transform:uppercase;}
.sub-tabs{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none;}
.sub-tabs::-webkit-scrollbar{display:none;}
.cat-hdr{padding:10px 16px 6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);background:rgba(0,48,135,0.04);border-left:3px solid var(--gold);margin:4px 12px 2px;border-radius:0 6px 6px 0;}
.cl-group{margin:0 12px 6px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,48,135,.08);border:1px solid var(--border);}
.cl-item{display:flex;align-items:flex-start;min-height:54px;padding:14px 16px;border-bottom:1px solid var(--border);background:#fff;position:relative;cursor:pointer;}
.cl-item:last-child{border-bottom:none;}
.cl-item.checked{background:var(--green-bg);}
.cl-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transform-origin:center;transition:transform .2s;border-radius:0 2px 2px 0;}
.cl-item.checked::before{transform:scaleY(1);background:var(--green);}
.chk-wrap{width:44px;height:44px;margin:-6px 0 -6px -4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chk-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.cl-item.checked .chk-circle{background:var(--green);border-color:var(--green);}
.chk-icon{opacity:0;transition:opacity .18s;color:#fff;font-size:13px;font-weight:700;line-height:1;}
.cl-item.checked .chk-icon{opacity:1;}
.item-body{flex:1;padding-left:10px;min-width:0;}
.item-txt{font-size:14px;font-weight:500;color:#1a1a2e;line-height:1.45;}
.cl-item.checked .item-txt{color:#5a7a6a;text-decoration:line-through;text-decoration-color:rgba(29,184,107,.5);}
.item-note{display:inline-flex;align-items:center;gap:4px;margin-top:5px;background:rgba(245,197,24,.15);color:#7a5f00;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;}
.note-btn{display:flex;margin-top:8px;background:none;border:none;font-family:inherit;font-size:12px;color:var(--gray);cursor:pointer;padding:4px 0;align-items:center;gap:4px;}
.note-btn.has{color:var(--navy);}
.note-ta{display:none;margin-top:6px;width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;color:#1a1a2e;background:var(--light);outline:none;resize:none;-webkit-appearance:none;}
.note-ta.open{display:block;}
.note-ta:focus{border-color:var(--navy);}

/* INFO */
.match-card{margin:14px 12px 4px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,48,135,.08);border:1px solid var(--border);}
.mc-hdr{background:linear-gradient(135deg,var(--navy2),var(--navy));padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
.mc-fields{display:grid;grid-template-columns:1fr 1fr;}
.mc-field{padding:12px 16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.mc-field:nth-child(2n){border-right:none;}
.mc-field:nth-last-child(-n+2){border-bottom:none;}
.mc-field label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.9px;color:var(--gray);font-weight:700;margin-bottom:4px;}
.mc-field input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--navy);min-height:28px;-webkit-user-select:text;user-select:text;}
.mc-field input::placeholder{color:#ccc;font-weight:400;}
.sig-card{margin:8px 12px 24px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,48,135,.08);border:1px solid var(--border);}
.sig-hdr{background:linear-gradient(135deg,var(--navy2),var(--navy));padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
.sig-body{padding:14px 16px;}
.sig-body label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.9px;color:var(--gray);font-weight:700;margin-bottom:6px;}
.sig-body input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:15px;font-weight:600;font-style:italic;color:var(--navy);outline:none;-webkit-appearance:none;min-height:52px;-webkit-user-select:text;user-select:text;}
.sig-body input:focus{border-color:var(--navy);}

/* NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sab));padding-bottom:var(--sab);background:#fff;border-top:2px solid var(--gold);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(0,48,135,.10);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;min-height:var(--nav-h);font-family:inherit;}
.nav-btn.on .nav-ic{color:var(--navy);}
.nav-btn.on .nav-lbl{color:var(--navy);font-weight:800;}
.nav-ic{color:var(--gray);position:relative;line-height:1;}
.nav-lbl{font-size:10px;font-weight:500;color:var(--gray);}
.pip{position:absolute;top:-2px;right:-4px;width:8px;height:8px;background:#e53;border-radius:50%;border:1.5px solid #fff;display:none;}
.pip.on{display:block;}

.overlay{position:fixed;inset:0;background:rgba(0,24,80,.6);z-index:400;display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:20px 24px calc(28px + var(--sab));animation:up .3s cubic-bezier(.22,1,.36,1);}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet h2{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;}
.sheet p{font-size:14px;color:var(--gray);margin-bottom:20px;line-height:1.5;}
.btn-navy{width:100%;height:52px;background:var(--navy);color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.btn-cancel{width:100%;height:52px;background:var(--light);color:var(--navy);border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--sab) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;white-space:nowrap;z-index:500;opacity:0;transition:opacity .2s,transform .25s;pointer-events:none;box-shadow:0 4px 20px rgba(0,48,135,.3);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="spacer"></div>
<div class="hdr">
  <div class="re-badge">RE</div>
  <div class="hdr-t">
    <h1>Match Commissioner</h1>
    <p>Rugby Europe — Official Check-list</p>
  </div>
  <button class="icon-btn" id="resetBtn">&#8635;</button>
</div>
<div class="prog">
  <div class="prog-row"><span class="prog-lbl">Overall Progress</span><span class="prog-n" id="pn">0 / 0</span></div>
  <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="scroll" id="scroll"></div>

<nav class="bot-nav">
  <button class="nav-btn on" id="nb-overview" onclick="goNav('overview')">
    <span class="nav-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.7"/><rect x="12" y="2" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.7"/><rect x="2" y="12" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.7"/><rect x="12" y="12" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.7"/></svg></span>
    <span class="nav-lbl">Overview</span>
  </button>
  <button class="nav-btn" id="nb-checklist" onclick="goNav('checklist')">
    <span class="nav-ic">
      <div class="pip" id="pip"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 6h14M4 11h14M4 16h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="18" cy="16" r="3.2" stroke="currentColor" stroke-width="1.7"/><path d="M16.8 16l.9 1 1.8-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </span>
    <span class="nav-lbl">Check-list</span>
  </button>
  <button class="nav-btn" id="nb-info" onclick="goNav('info')">
    <span class="nav-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M11 10v5M11 7.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
    <span class="nav-lbl">Match Info</span>
  </button>
</nav>

<div class="overlay" id="modal">
  <div class="sheet">
    <h2>Reset check-list?</h2>
    <p>All checked items and notes will be permanently deleted. This cannot be undone.</p>
    <button class="btn-navy" id="confirmReset">Reset everything</button>
    <button class="btn-cancel" id="cancelModal">Cancel</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────
var phases = [
  {id:"j7", label:"D-7", desc:"7 days before the match", items:[
    {id:"j7_1", text:"Game info completed by both teams and shared with RE (online)"},
    {id:"j7_2", text:"Colours of kits confirmed by both teams"},
    {id:"j7_3", text:"Stadium visit confirmed"},
    {id:"j7_4", text:"Information about the venue (from Host Union or RE)"},
    {id:"j7_5", text:"Managers Meeting confirmed"}
  ]},
  {id:"j3", label:"D-3/2", desc:"3 to 2 days before", items:[
    {id:"j3_1", text:"Player lists received from both teams (Sportlomo)"},
    {id:"j3_2", text:"Anthems (Host, Visiting Union, Rugby Europe) on USB"},
    {id:"j3_3", text:"Information about the Match Protocol from Host Union"},
    {id:"j3_4", text:"Run sheet received from Host Union and shared with RE"},
    {id:"j3_5", text:"All documents necessary to conduct the mission"},
    {id:"j3_6", text:"Check with RE for latest news regarding the game"}
  ]},
  {id:"j1", label:"D-1", desc:"Day before — on site", items:[
    {id:"j1_gf", text:"GROUND FACILITIES", cat:true},
    {id:"j1_1", text:"Pitch dimensions (World Rugby Laws of the Game 1.3)"},
    {id:"j1_2", text:"Grass condition"},
    {id:"j1_3", text:"Score board / Time Management"},
    {id:"j1_4", text:"Changing rooms (size, equipment, toilets, showers, massage table…)"},
    {id:"j1_5", text:"Medical room"},
    {id:"j1_6", text:"Anti-doping room"},
    {id:"j1_7", text:"HIA room (REC only)"},
    {id:"j1_8", text:"Security (organization, access, restricted areas)"},
    {id:"j1_9", text:"Technical zone"},
    {id:"j1_bibs", text:"BIBS", cat:true},
    {id:"j1_10", text:"Substitution (colours / quantity)"},
    {id:"j1_11", text:"Water Carriers (colours / quantity)"},
    {id:"j1_12", text:"Medics (colours / quantity)"},
    {id:"j1_med", text:"MEDIA & EQUIPMENT", cat:true},
    {id:"j1_13", text:"Media accreditations — list to communication@rugbyeurope.eu"},
    {id:"j1_14", text:"Score table and equipment"},
    {id:"j1_15", text:"Internet connection (WIFI) — ask for password and try to connect"},
    {id:"j1_16", text:"Rhino balls", note:"6 balls required"},
    {id:"j1_17", text:"Referees Communication Kits (Art. 5.3 in Manual)"},
    {id:"j1_18", text:"Ball kids", note:"8 ball kids required"},
    {id:"j1_str", text:"STREAMING", cat:true},
    {id:"j1_19", text:"Rugby Europe TV — camera plan and number of cameras"},
    {id:"j1_20", text:"Local / National TV"},
    {id:"j1_21", text:"Streaming test done with RE"},
    {id:"j1_ban", text:"BANNERS", cat:true},
    {id:"j1_22", text:"Rugby Europe board"},
    {id:"j1_23", text:"Partners board(s) — as directed in Manual 9.5"},
    {id:"j1_24", text:"Photography — send pictures to communication@rugbyeurope.eu"},
    {id:"j1_25", text:"Flags (Host, Visiting Union, Rugby Europe)"},
    {id:"j1_26", text:"RE branded Touch Flags"},
    {id:"j1_mgr", text:"MANAGERS MEETING", cat:true},
    {id:"j1_27", text:"Check teams jerseys for RE logo on right sleeve"},
    {id:"j1_28", text:"Ask for exceptional protocol circumstances — forward to RE"},
    {id:"j1_pap", text:"PAPERWORK (Section 15 in Manual)", cat:true},
    {id:"j1_29", text:"Hard copy of player lists, signed by Manager"},
    {id:"j1_30", text:"Hard copy of RE team delegation consent form, signed by players & Manager"},
    {id:"j1_31", text:"Therapeutic Use Exemption, if any"}
  ]},
  {id:"md", label:"Match Day", desc:"Match day", items:[
    {id:"md_pre", text:"BEFORE THE MATCH (-120 min to KO)", cat:true},
    {id:"md_1", text:"Inform RE asap of any last-minute Team Sheet changes (Sportlomo)"},
    {id:"md_2", text:"Recheck protocol — if any change, inform RE immediately"},
    {id:"md_3", text:"Recheck streaming (technical aspects OK?)"},
    {id:"md_4", text:"Briefing referee + ARs — Coin Toss with RE kit"},
    {id:"md_5", text:"Check Score-table and presence of assistance"},
    {id:"md_6", text:"Ambulance (presence, access to the pitch…)"},
    {id:"md_7", text:"Briefing with Match Doctor"},
    {id:"md_8", text:"Check provision of ice, water and snacks"},
    {id:"md_aft", text:"AFTER THE MATCH", cat:true},
    {id:"md_9", text:"Score sent via Sportlomo / text / email to RE (at final whistle)"},
    {id:"md_10", text:"Final gamesheet from Sportlomo to rugbyXV@rugbyeurope.eu (within 2h)"},
    {id:"md_11", text:"Ask Official Photographer to send pictures to communication@rugbyeurope.eu"},
    {id:"md_12", text:"Report any discipline matters (red cards, citing, misconduct…)"},
    {id:"md_13", text:"Copy of video of the game for referee + Team managers"}
  ]},
  // ── MANAGERS MEETING (subsections) ──────────────────────────────────────
  {id:"mm", label:"Mgr Meeting", desc:"Managers Meeting", subsections:[
    {id:"mm_s1", label:"Venue Tour", desc:"Venue Tour & Key Areas", items:[
      {id:"mm_1_1", text:"Team arrival point and access route"},
      {id:"mm_1_2", text:"Changing rooms"},
      {id:"mm_1_3", text:"Showers and facilities"},
      {id:"mm_1_4", text:"Medical room / medical support location"},
      {id:"mm_1_5", text:"Pitch access points"},
      {id:"mm_1_6", text:"Warm-up areas (Annex pitch for Central)"},
      {id:"mm_1_7", text:"Players' tunnel / access to the pitch"},
      {id:"mm_1_8", text:"Team benches and technical zone"}
    ]},
    {id:"mm_s2", label:"Arrival", desc:"Team Arrival & Pre-Match Schedule", items:[
      {id:"mm_2_1", text:"Confirmation of team arrival time"},
      {id:"mm_2_2", text:"Access to changing rooms"},
      {id:"mm_2_3", text:"Kit and equipment set-up"},
      {id:"mm_2_4", text:"Reminder of official match schedule"},
      {id:"mm_2_5", text:"Match balls availability"}
    ]},
    {id:"mm_s3", label:"Warm-Up", desc:"Warm-Up Procedure", items:[
      {id:"mm_3_1", text:"Warm-up start time"},
      {id:"mm_3_2", text:"Warm-up location (pitch or designated area)"},
      {id:"mm_3_3", text:"Duration of warm-up on the pitch"},
      {id:"mm_3_4", text:"Restrictions on the field of play before kick-off"},
      {id:"mm_3_5", text:"Return to changing rooms before kick-off"},

    {id:"mm_s4", label:"Protocol", desc:"Pre-Match Protocol (Strict Timings)", items:[

      {id:"mm_4_2", text:"Teams ready for walk-out"},
      {id:"mm_4_3", text:"Walk-out sequence"},
      {id:"mm_4_4", text:"Team line-up on the pitch"},
      {id:"mm_4_5", text:"Coin toss with captains and referee"},
      {id:"mm_4_6", text:"Final preparations before kick-off"}

      {id:"mm_5_3", text:"Number of staff allowed (2 medics and 2 water carriers – bibs)"},
      {id:"mm_5_4", text:"Bibs for substitute players and S&C if relevant"},

    {id:"j2_2", text:"2. Gamesheet (Sportlomo) + signed Team Sheets & Consent Forms"},

    {id:"j2_4", text:"4. Copies of the Sub Cards"},

// ── HELPERS ───────────────────────────────────────────────────────────────
function phaseItems(p) {
  if (p.subsections) {
    return p.subsections.reduce(function(a, s){ return a.concat(s.items); }, []);
  }
  return p.items.filter(function(i){ return !i.cat; });
}
function allItems() {
  return phases.reduce(function(a, p){ return a.concat(phaseItems(p)); }, []);
}
function phaseDone(p) {
  var it = phaseItems(p);
  return it.length > 0 && it.every(function(i){ return state[i.id] && state[i.id].c; });
}
function phasePct(p) {
  var it = phaseItems(p);
  if (!it.length) return 0;
  return Math.round(it.filter(function(i){ return state[i.id] && state[i.id].c; }).length / it.length * 100);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATE ─────────────────────────────────────────────────────────────────
var state = {}, hasLS = false, curNav = 'overview', curPhase = 'j7', curSubSec = 'mm_s1', toastT = null;
try { localStorage.setItem('_x','1'); localStorage.removeItem('_x'); hasLS = true; } catch(e) {}
function save(){ try { if(hasLS) localStorage.setItem('remc7', JSON.stringify(state)); } catch(e){} }
function load(){ try { var s = hasLS ? localStorage.getItem('remc7') : null; if(s) state = JSON.parse(s); } catch(e){ state={}; } }

// ── NAV ───────────────────────────────────────────────────────────────────
function goNav(n) {
  curNav = n;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('on'); });
  var el = document.getElementById('nb-'+n); if(el) el.classList.add('on');
  render();
}

function render() {
  updateProg(); buildTabs();
  if (curNav === 'overview') renderOverview();
  else if (curNav === 'checklist') renderChecklist();
  else renderInfo();
  updatePip();
}

function updateProg() {
  var all = allItems(), done = all.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
  document.getElementById('pn').textContent = done + ' / ' + all.length;
  document.getElementById('pf').style.width = (all.length ? done/all.length*100 : 0) + '%';
}
function updatePip() {
  var any = allItems().some(function(i){ return !state[i.id] || !state[i.id].c; });
  document.getElementById('pip').className = 'pip' + (any ? ' on' : '');
}

// ── TABS ──────────────────────────────────────────────────────────────────
function buildTabs() {
  var bar = document.getElementById('tabs');
  if (curNav !== 'checklist') { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  var h = '';
  phases.forEach(function(p) {
    var it = phaseItems(p), d = it.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
    h += '<button class="tab ' + (p.id===curPhase?'on':'off') + (phaseDone(p)?' done':'') + '" data-p="'+p.id+'">'
      + p.label + '<span class="tbadge">'+d+'/'+it.length+'</span></button>';
  });
  bar.innerHTML = h;
  bar.querySelectorAll('.tab').forEach(function(b) {
    b.addEventListener('click', function(){ curPhase = this.getAttribute('data-p'); render(); });
  });
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview() {
  var all = allItems(), done = all.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
  var pct = all.length ? Math.round(done/all.length*100) : 0, deg = pct * 3.6;
  var bg = 'conic-gradient(#F5C518 '+deg+'deg, rgba(255,255,255,0.15) '+deg+'deg)';
  var h = '<div class="ov-total">'
    + '<div class="ov-ring" style="background:'+bg+'"><div class="ov-inner">'+pct+'%</div></div>'
    + '<div class="ov-txt"><h3>'+done+' / '+all.length+' validated</h3><p>Tap a phase to continue</p></div>'
    + '</div><div class="ov-grid">';
  phases.forEach(function(p) {
    var it = phaseItems(p), d = it.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
    var pp = phasePct(p), dn = phaseDone(p);
    h += '<div class="pc'+(dn?' done':'')+'" data-p="'+p.id+'">'
      + '<div class="pc-top"><div class="pc-label">'+p.label+'</div><div class="pc-desc">'+p.desc+'</div></div>'
      + '<div class="pc-bar"><div class="pc-fill" style="width:'+pp+'%"></div></div>'
      + '<div class="pc-bot"><span class="pc-pct">'+d+'/'+it.length+'</span><span class="pc-done">&#10003; Done</span></div>'
      + '</div>';
  });
  h += '</div><button class="export-btn" id="expBtn">&#8659;&nbsp; Export PDF Report</button>';
  var sc = document.getElementById('scroll'); sc.innerHTML = h;
  sc.querySelectorAll('.pc').forEach(function(c) {
    c.addEventListener('click', function(){ curPhase = this.getAttribute('data-p'); goNav('checklist'); });
  });
  document.getElementById('expBtn').addEventListener('click', exportPDF);
}

// ── CHECKLIST ─────────────────────────────────────────────────────────────
function renderChecklist() {
  var phase = null;
  for (var i = 0; i < phases.length; i++) { if (phases[i].id === curPhase) { phase = phases[i]; break; } }
  if (!phase) return;
  var sc = document.getElementById('scroll');
  var h = '<div class="sec-lbl">' + phase.desc + '</div>';

  if (phase.subsections) {
    // ── Sub-tabs row ──
    h += '<div style="display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;">';
    phase.subsections.forEach(function(sub) {
      var d = sub.items.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
      var dn = (d === sub.items.length);
      var isOn = (curSubSec === sub.id);
      var bg = isOn ? 'background:var(--gold);color:var(--navy2);' : 'background:rgba(0,48,135,0.1);color:var(--navy);';
      var badgeBg = isOn ? 'background:var(--navy2);color:var(--gold);' : 'background:rgba(0,48,135,0.15);color:var(--navy);';
      if (dn) badgeBg = 'background:var(--green);color:#fff;';
      h += '<button data-sub="'+sub.id+'" style="flex-shrink:0;height:34px;padding:0 13px;border-radius:17px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:none;white-space:nowrap;font-family:inherit;'+bg+'">'
        + sub.label
        + '<span style="min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;'+badgeBg+'">'+d+'/'+sub.items.length+'</span>'
        + '</button>';
    });
    h += '</div>';

    // ── Active subsection items ──
    var activeSub = null;
    for (var j = 0; j < phase.subsections.length; j++) {
      if (phase.subsections[j].id === curSubSec) { activeSub = phase.subsections[j]; break; }
    }
    if (!activeSub) { activeSub = phase.subsections[0]; curSubSec = activeSub.id; }
    h += '<div class="cat-hdr">' + activeSub.desc + '</div>';
    h += '<div class="cl-group">';
    activeSub.items.forEach(function(item) {
      h += buildItemHTML(item);
    });
    h += '</div>';

  } else {
    // ── Normal phase with flat items / cat headers ──
    var inG = false;
    phase.items.forEach(function(item) {
      if (item.cat) {
        if (inG) { h += '</div>'; inG = false; }
        h += '<div class="cat-hdr">'+item.text+'</div><div class="cl-group">'; inG = true;
      } else {
        if (!inG) { h += '<div class="cl-group">'; inG = true; }
        h += buildItemHTML(item);
      }
    });
    if (inG) h += '</div>';
  }

  sc.innerHTML = h;

  // Sub-tab click events
  if (phase.subsections) {
    sc.querySelectorAll('[data-sub]').forEach(function(b) {
      b.addEventListener('click', function(e) {
        e.stopPropagation();
        curSubSec = this.getAttribute('data-sub');
        renderChecklist();
      });
    });
  }

  // Item events
  sc.querySelectorAll('.cl-item').forEach(function(el) {
    var id = el.getAttribute('data-id');
    var cw = el.querySelector('.chk-wrap'), tx = el.querySelector('.item-txt');
    var nb = el.querySelector('.note-btn'), ta = el.querySelector('.note-ta');
    function tog(e){ e.stopPropagation(); doToggle(id); }
    cw.addEventListener('click', tog); tx.addEventListener('click', tog);
    if (nb) nb.addEventListener('click', function(e){ e.stopPropagation(); ta.classList.toggle('open'); if(ta.classList.contains('open')) setTimeout(function(){ ta.focus(); }, 50); });
    if (ta) {
      ta.addEventListener('input', function(e){ e.stopPropagation(); doNote(id, ta.value); });
      ta.addEventListener('click', function(e){ e.stopPropagation(); });
      ta.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive:true});
    }
  });
}

function buildItemHTML(item) {
  var s = state[item.id] || {c:false, n:''}, hn = !!s.n;
  return '<div class="cl-item'+(s.c?' checked':'')+'" data-id="'+item.id+'">'
    + '<div class="chk-wrap"><div class="chk-circle"><span class="chk-icon">&#10003;</span></div></div>'
    + '<div class="item-body"><div class="item-txt">'+item.text+'</div>'
    + (item.note ? '<div class="item-note">&#9888; '+item.note+'</div>' : '')
    + '<button class="note-btn'+(hn?' has':'')+'">'+(hn?'&#128204; View note':'+ Add a note')+'</button>'
    + '<textarea class="note-ta'+(hn?' open':'')+'" rows="2" placeholder="Add a note…">'+esc(s.n)+'</textarea>'
    + '</div></div>';
}

// ── INFO ──────────────────────────────────────────────────────────────────
function renderInfo() {
  var sc = document.getElementById('scroll');
  sc.innerHTML = '<div class="match-card"><div class="mc-hdr">Match Information</div><div class="mc-fields">'
    + '<div class="mc-field"><label>Commissioner</label><input type="text" id="fi-name" placeholder="Full name…"></div>'
    + '<div class="mc-field"><label>Union</label><input type="text" id="fi-union" placeholder="Union…"></div>'
    + '<div class="mc-field"><label>Match / Division</label><input type="text" id="fi-match" placeholder="France vs Spain…"></div>'
    + '<div class="mc-field"><label>Venue / Stadium</label><input type="text" id="fi-venue" placeholder="Stadium name…"></div>'
    + '</div></div>'
    + '<div class="sig-card"><div class="sig-hdr">Match Commissioner Signature</div>'
    + '<div class="sig-body"><label>Full name (signature)</label>'
    + '<input type="text" id="fi-sig" placeholder="First Last…"></div></div>';
  setTimeout(function(){
    bind('fi-name','__name'); bind('fi-union','__union');
    bind('fi-match','__match'); bind('fi-venue','__venue'); bind('fi-sig','__sig');
  }, 0);
}
function bind(elId, key) {
  var el = document.getElementById(elId); if(!el) return;
  el.value = state[key] || '';
  el.addEventListener('input', function(){ state[key] = el.value; save(); });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function doToggle(id) {
  if (!state[id]) state[id] = {c:false, n:''};
  state[id].c = !state[id].c; save();
  var el = document.querySelector('.cl-item[data-id="'+id+'"]');
  if (el) el.className = 'cl-item' + (state[id].c ? ' checked' : '');
  updateProg(); buildTabs(); updatePip();
  showToast(state[id].c ? '&#10003; Validated' : '&#9675; Unchecked');
}
function doNote(id, val) {
  if (!state[id]) state[id] = {c:false, n:''}; state[id].n = val; save();
  var el = document.querySelector('.cl-item[data-id="'+id+'"]'); if(!el) return;
  var btn = el.querySelector('.note-btn');
  if (btn) { btn.className = 'note-btn'+(val?' has':''); btn.innerHTML = val ? '&#128204; View note' : '+ Add a note'; }
}
function showToast(msg) {
  var t = document.getElementById('toast'); t.innerHTML = msg; t.className = 'toast on';
  clearTimeout(toastT); toastT = setTimeout(function(){ t.className = 'toast'; }, 1800);
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────
function exportPDF() {
  var all = allItems(), done = all.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
  var pct = all.length ? Math.round(done/all.length*100) : 0;
  var date = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'});
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;font-size:12px;color:#111;padding:20px 28px;}'
    + 'h1{font-size:20px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#003087;margin-bottom:2px;}'
    + '.sub{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;border-bottom:2px solid #F5C518;padding-bottom:8px;}'
    + '.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;background:#f2f5f9;border-radius:8px;padding:12px 16px;margin-bottom:12px;border-left:4px solid #003087;}'
    + '.info-row label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#888;font-weight:700;display:block;margin-bottom:2px;}'
    + '.info-row span{font-size:13px;font-weight:700;color:#003087;}'
    + '.pbar{height:8px;background:#dde3ec;border-radius:99px;overflow:hidden;margin-bottom:4px;}'
    + '.pfill{height:100%;background:linear-gradient(90deg,#003087,#1a56c4);border-radius:99px;width:'+pct+'%;}'
    + '.plbl{font-size:10px;color:#888;margin-bottom:14px;}'
    + '.ph-title{font-size:12px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#fff;background:#003087;padding:7px 12px;margin:14px 0 4px;border-radius:6px;}'
    + '.cat-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#003087;padding:8px 0 3px;border-bottom:1px solid #F5C518;margin-bottom:3px;}'
    + '.row{display:flex;align-items:flex-start;padding:5px 4px;border-bottom:1px solid #eee;gap:10px;}'
    + '.row:last-child{border-bottom:none;}'
    + '.chk{width:16px;height:16px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}'
    + '.chk.ok{background:#1DB86B;border-color:#1DB86B;color:#fff;}'
    + '.lbl{flex:1;font-size:11px;color:#111;line-height:1.4;}'
    + '.lbl.done{color:#5a7a6a;text-decoration:line-through;}'
    + '.cmt{margin:3px 0 4px 26px;background:#fffbea;border-left:3px solid #F5C518;padding:5px 8px;font-size:10px;color:#555;border-radius:0 4px 4px 0;font-style:italic;}'
    + '.sig-sec{margin-top:24px;padding-top:14px;border-top:3px solid #003087;display:flex;justify-content:space-between;align-items:flex-end;}'
    + '.sig-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#888;font-weight:700;margin-bottom:4px;}'
    + '.sig-name{font-size:16px;font-style:italic;font-weight:700;color:#003087;border-bottom:1px solid #ccc;padding-bottom:4px;min-width:180px;}'
    + '.sig-date{font-size:10px;color:#555;margin-top:4px;}'
    + '.re-brand{text-align:right;font-size:10px;color:#888;font-weight:700;letter-spacing:1px;}'
    + '@page{margin:15mm;size:A4;}'
    + '</style></head><body>';
  html += '<h1>Rugby Europe — Match Commissioner Report</h1>'
    + '<div class="sub">Official Check-list &nbsp;·&nbsp; '+date+'</div>';
  html += '<div class="info-grid">'
    + '<div class="info-row"><label>Commissioner</label><span>'+esc(state['__name']||'—')+'</span></div>'
    + '<div class="info-row"><label>Union</label><span>'+esc(state['__union']||'—')+'</span></div>'
    + '<div class="info-row"><label>Match / Division</label><span>'+esc(state['__match']||'—')+'</span></div>'
    + '<div class="info-row"><label>Venue / Stadium</label><span>'+esc(state['__venue']||'—')+'</span></div>'
    + '</div>';
  html += '<div class="pbar"><div class="pfill"></div></div>'
    + '<div class="plbl">'+done+' / '+all.length+' items validated ('+pct+'%)</div>';

  phases.forEach(function(p) {
    if (p.subsections) {
      html += '<div class="ph-title">'+p.label+' — '+p.desc+'</div>';
      p.subsections.forEach(function(sub) {
        var d = sub.items.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
        html += '<div class="cat-t">'+sub.desc+' ('+d+'/'+sub.items.length+')</div>';
        sub.items.forEach(function(item) {
          var s = state[item.id] || {c:false, n:''};
          html += '<div class="row"><div class="chk'+(s.c?' ok':'')+'>'+(s.c?'&#10003;':'')+'</div>'
            + '<div class="lbl'+(s.c?' done':'')+'">'+item.text+'</div></div>';
          if (s.n) html += '<div class="cmt">&#128204; '+esc(s.n)+'</div>';
        });
      });
    } else {
      var it = phaseItems(p), d = it.filter(function(i){ return state[i.id] && state[i.id].c; }).length;
      html += '<div class="ph-title">'+p.label+' — '+p.desc+' ('+d+'/'+it.length+')</div>';
      p.items.forEach(function(item) {
        if (item.cat) { html += '<div class="cat-t">'+item.text+'</div>'; return; }
        var s = state[item.id] || {c:false, n:''};
        html += '<div class="row"><div class="chk'+(s.c?' ok':'')+'>'+(s.c?'&#10003;':'')+'</div>'
          + '<div class="lbl'+(s.c?' done':'')+'">'+item.text+'</div></div>';
        if (s.n) html += '<div class="cmt">&#128204; '+esc(s.n)+'</div>';
      });
    }
  });

  html += '<div class="sig-sec">'
    + '<div><div class="sig-lbl">Match Commissioner Signature</div>'
    + '<div class="sig-name">'+esc(state['__sig']||'—')+'</div>'
    + '<div class="sig-date">Date: '+date+'</div></div>'
    + '<div class="re-brand">RUGBY EUROPE<br>Match Commissioner</div>'
    + '</div></body></html>';

  var w = window.open('','_blank');
  if (!w) { showToast('Allow popups to export'); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(function(){ w.print(); }, 500);
}

// ── MODAL / RESET ─────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', function(){ document.getElementById('modal').classList.add('open'); });
document.getElementById('cancelModal').addEventListener('click', function(){ document.getElementById('modal').classList.remove('open'); });
document.getElementById('confirmReset').addEventListener('click', function(){ state={}; save(); document.getElementById('modal').classList.remove('open'); render(); showToast('Check-list reset'); });
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });

load(); render();
</script>
